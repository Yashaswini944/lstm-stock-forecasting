<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LSTM Stock Forecast</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f5f5f5;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    input {
      padding: 8px;
      width: 80px;
      margin-right: 10px;
    }
  </style>
</head>
<body>

  <h1>📈 LSTM Stock Price Forecast</h1>

  <div class="card">
    <p><strong>Backend Status:</strong> <span id="status">Checking...</span></p>
  </div>

  <div class="card">
    <label>Days to forecast:</label>
    <input type="number" id="days" value="5" min="1" />
    <button onclick="getForecast()">Predict</button>
  </div>

  <div class="card">
    <h2>Forecast Output</h2>
    <ul id="forecast-list"></ul>
    <canvas id="forecastChart" height="120"></canvas>
  </div>

  <script>
    const API = "http://127.0.0.1:8000";

    async function checkStatus() {
      try {
        const res = await fetch(API + "/");
        const data = await res.json();
        document.getElementById("status").textContent = data.message;
        document.getElementById("status").style.color = "green";
      } catch {
        document.getElementById("status").textContent = "API not reachable";
        document.getElementById("status").style.color = "red";
      }
    }

    checkStatus();

    let chart;

    async function getForecast() {
      const days = document.getElementById("days").value;

      const res = await fetch(API + "/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ days: Number(days) })
      });

      const data = await res.json();

      const list = document.getElementById("forecast-list");
      list.innerHTML = "";

      data.forecast.forEach((value, i) => {
        const li = document.createElement("li");
        li.textContent = `Day ${i + 1}: $${value.toFixed(2)}`;
        list.appendChild(li);
      });

      const ctx = document.getElementById("forecastChart").getContext("2d");

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels: data.forecast.map((_, i) => `Day ${i + 1}`),
          datasets: [{
            label: "Predicted Price",
            data: data.forecast,
            borderColor: "#2563eb",
            backgroundColor: "rgba(37, 99, 235, 0.2)",
            borderWidth: 2,
            tension: 0.3
          }]
        }
      });
    }
  </script>

</body>
</html>
